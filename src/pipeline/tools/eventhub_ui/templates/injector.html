{% extends "base.html" %}
{% block title %}Message Injection{% endblock %}
{% block content %}
<h1>Message Injection</h1>
<p class="text-muted mb-1">Publish a message to an EventHub</p>

<div class="card">
    <form id="inject-form"
          hx-post="/inject/preview"
          hx-target="#inject-result"
          hx-swap="innerHTML">
        <div class="form-group">
            <label>EventHub</label>
            <select name="eventhub_name" id="inject-hub">
                {% for hub in hubs %}
                <option value="{{ hub.eventhub_name }}">{{ hub.eventhub_name }} ({{ hub.domain }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Partition Key (optional)</label>
            <input type="text" name="partition_key" id="inject-pkey" placeholder="Leave empty for auto-assign" style="width: 300px;">
        </div>
        <div class="form-group">
            <label>Message Body (JSON)</label>
            <textarea name="body" id="inject-body" rows="12" placeholder='{"key": "value"}'></textarea>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button type="submit" class="btn btn-primary">
                Preview
            </button>
        </div>
    </form>
</div>

<div id="inject-result"></div>
{% endblock %}
