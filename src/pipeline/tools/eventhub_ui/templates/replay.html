{% extends "base.html" %}
{% block title %}Message Replay{% endblock %}
{% block content %}
<h1>Message Replay</h1>
<p class="text-muted mb-1">Re-publish messages from a source partition/time-range to a destination EventHub</p>

<div class="card">
    <form id="replay-form">
        <div class="grid-2">
            <div>
                <h2 style="margin-top: 0;">Source</h2>
                <div class="form-group">
                    <label>EventHub</label>
                    <select name="source_hub">
                        {% for hub in hubs %}
                        <option value="{{ hub.eventhub_name }}">{{ hub.eventhub_name }} ({{ hub.domain }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Partition</label>
                    <input type="text" name="source_partition" placeholder="e.g. 0" required style="width: 80px;">
                </div>
                <div class="form-group">
                    <label>Start Time (UTC)</label>
                    <input type="datetime-local" name="start_time" required step="1">
                    <div class="time-quick-btns">
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 5)">-5m</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 10)">-10m</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 30)">-30m</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 60)">-1h</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 1440)">-24h</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>End Time (UTC)</label>
                    <input type="datetime-local" name="end_time" required step="1">
                    <div class="time-quick-btns">
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 0)">Now</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 5)">-5m</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 10)">-10m</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 30)">-30m</button>
                        <button type="button" onclick="setTimeOffset(this.closest('.form-group').querySelector('input'), 60)">-1h</button>
                    </div>
                </div>
            </div>
            <div>
                <h2 style="margin-top: 0;">Destination</h2>
                <div class="form-group">
                    <label>EventHub</label>
                    <select name="dest_hub">
                        {% for hub in hubs %}
                        <option value="{{ hub.eventhub_name }}">{{ hub.eventhub_name }} ({{ hub.domain }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
            <button type="button" class="btn btn-primary"
                    hx-post="/replay/preview"
                    hx-include="#replay-form"
                    hx-target="#replay-result"
                    hx-swap="innerHTML">
                Preview
            </button>
        </div>
    </form>
</div>

<div id="replay-result"></div>

<script>
    function setTimeOffset(input, minutesDelta) {
        const base = input.value ? new Date(input.value + 'Z').getTime() : Date.now();
        const d = new Date(base - minutesDelta * 60000);
        input.value = d.toISOString().slice(0, 19);
    }
</script>
{% endblock %}
